<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Maintenance — RentEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:300; opacity:0; pointer-events:none; transition:opacity .2s; }
        .modal-overlay.open { opacity:1; pointer-events:all; }
        .modal { background:var(--surface); border-radius:16px; padding:28px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; transform:translateY(16px); transition:transform .2s; }
        .modal-overlay.open .modal { transform:translateY(0); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .modal-header h3 { font-size:18px; font-weight:600; }
        .modal-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-2); }
        select { width:100%; height:48px; padding:0 16px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:15px; color:var(--text-1); background:var(--surface); outline:none; }
        select:focus { border-color:var(--primary); }
        textarea { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:15px; font-family:inherit; resize:vertical; outline:none; min-height:100px; }
        textarea:focus { border-color:var(--primary); }
        .request-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
        .request-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
        .request-issue { font-size:15px; font-weight:600; }
        .request-meta  { font-size:13px; color:var(--text-2); margin-top:6px; }
        .request-notes { background:var(--bg); border-radius:8px; padding:10px 12px; font-size:13px; margin-top:10px; color:var(--text-2); }
        .requests-grid { display:grid; gap:12px; }
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-2); }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand"><div class="icon">🏢</div><span>RentEase</span></div>
        <nav class="sidebar-nav">
            <a href="/pages/tenant/dashboard.html"   class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="/pages/tenant/pay-rent.html"    class="nav-item"><span class="nav-icon">💳</span> Pay Rent</a>
            <a href="/pages/tenant/payments.html"    class="nav-item"><span class="nav-icon">📋</span> Payment History</a>
            <a href="/pages/tenant/maintenance.html" class="nav-item active"><span class="nav-icon">🔧</span> Maintenance</a>
            <a href="/pages/tenant/profile.html"     class="nav-item"><span class="nav-icon">👤</span> My Profile</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-item" onclick="logout()"><span class="nav-icon">🚪</span> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <h1>Maintenance</h1>
            <div class="user-pill">
                <div class="avatar" id="userAvatar">T</div>
                <span id="userName">Tenant</span>
            </div>
        </div>

        <div class="page-header">
            <p style="color:var(--text-2);font-size:14px" id="requestCount">Loading...</p>
            <button class="btn btn-primary" style="width:auto;padding:0 20px"
                    onclick="openModal()">+ Report issue</button>
        </div>

        <div class="requests-grid" id="requestsGrid">
            <div class="empty-state"><div class="icon">🔧</div><p>Loading...</p></div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="issueModal" onclick="handleBackdrop(event)">
    <div class="modal">
        <div class="modal-header">
            <h3>Report an issue</h3>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="form-group">
            <label>Issue title</label>
            <div class="input-wrap">
                <span class="icon">🔧</span>
                <input type="text" id="issueTitle" placeholder="e.g. Broken water pipe"/>
            </div>
        </div>
        <div class="form-group">
            <label>Priority</label>
            <select id="issuePriority">
                <option value="LOW">Low — not urgent</option>
                <option value="MEDIUM" selected>Medium — needs attention</option>
                <option value="HIGH">High — affecting daily life</option>
                <option value="URGENT">Urgent — emergency</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description (optional)</label>
            <textarea id="issueDescription" placeholder="Describe the issue in detail..."></textarea>
        </div>
        <div id="issueAlert" class="alert"></div>
        <div style="margin-top:20px">
            <button class="btn btn-primary" id="submitBtn" onclick="submitIssue()">
                <span class="btn-text">Submit request</span>
                <div class="btn-spinner"></div>
            </button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/notifications.js"></script>
<script>
    requireAuth();

    const user = Auth.getUser();
    if (user) {
        document.getElementById('userName').textContent   = user.name;
        document.getElementById('userAvatar').textContent = user.name[0].toUpperCase();
    }

    const statusBadge = {
        PENDING:'badge-warning', IN_PROGRESS:'badge-info',
        COMPLETED:'badge-success', CANCELLED:'badge-error',
    };
    const priorityColor = {
        LOW:'#6B7280', MEDIUM:'#D97706', HIGH:'#DC2626', URGENT:'#7C3AED'
    };

    async function loadRequests() {
        try {
            const requests = await MaintenanceAPI.myRequests();
            const grid     = document.getElementById('requestsGrid');

            document.getElementById('requestCount').textContent =
                `${requests.length} request${requests.length !== 1 ? 's' : ''}`;

            if (requests.length === 0) {
                grid.innerHTML = `<div class="empty-state">
          <div class="icon">🔧</div>
          <p>No maintenance requests yet.</p>
        </div>`;
                return;
            }

            grid.innerHTML = requests.map(r => `
        <div class="request-card">
          <div class="request-header">
            <div>
              <div class="request-issue">${r.issue}</div>
              <div class="request-meta">
                📅 ${r.createdAt ? r.createdAt.substring(0,10) : '—'}
                ${r.priority
                ? `&nbsp;·&nbsp;<span style="color:${priorityColor[r.priority]};font-weight:500">${r.priority}</span>`
                : ''}
              </div>
            </div>
            <span class="badge ${statusBadge[r.status]||'badge-info'}">
              ${r.status.replace(/_/g,' ')}
            </span>
          </div>
          ${r.description
                ? `<p style="font-size:13px;color:var(--text-2);margin-top:8px">${r.description}</p>`
                : ''}
          ${r.notes
                ? `<div class="request-notes">💬 Admin note: ${r.notes}</div>`
                : ''}
          ${r.resolvedAt
                ? `<div style="font-size:12px;color:var(--success);margin-top:8px">
                ✅ Resolved on ${r.resolvedAt.substring(0,10)}</div>`
                : ''}
        </div>
      `).join('');
        } catch (err) { console.error(err); }
    }

    function openModal() {
        document.getElementById('issueTitle').value       = '';
        document.getElementById('issueDescription').value = '';
        document.getElementById('issuePriority').value    = 'MEDIUM';
        document.getElementById('issueAlert').className   = 'alert';
        document.getElementById('issueModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('issueModal').classList.remove('open');
    }

    function handleBackdrop(event) {
        if (event.target === document.getElementById('issueModal')) closeModal();
    }

    async function submitIssue() {
        const btn   = document.getElementById('submitBtn');
        const alert = document.getElementById('issueAlert');
        const issue = document.getElementById('issueTitle').value.trim();

        if (!issue) {
            alert.textContent = 'Issue title is required';
            alert.className   = 'alert alert-error show';
            return;
        }

        btn.classList.add('loading'); btn.disabled = true;
        try {
            await MaintenanceAPI.create({
                issue,
                description: document.getElementById('issueDescription').value.trim(),
                priority:    document.getElementById('issuePriority').value,
            });
            closeModal();
            await loadRequests();
        } catch (err) {
            alert.textContent = err.message;
            alert.className   = 'alert alert-error show';
        } finally {
            btn.classList.remove('loading'); btn.disabled = false;
        }
    }

    loadRequests();
</script>
</body>
</html>
