<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notifications — RentEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        .page-header  { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
        .page-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-outline-sm { padding:8px 16px; border-radius:8px; border:1.5px solid var(--border); background:none; font-size:13px; font-weight:500; cursor:pointer; color:var(--text-1); }
        .btn-outline-sm:hover { border-color:var(--primary); color:var(--primary); }
        .btn-danger-sm { padding:8px 16px; border-radius:8px; border:1.5px solid #FECACA; background:none; font-size:13px; font-weight:500; cursor:pointer; color:var(--error); }
        .btn-danger-sm:hover { background:#FEF2F2; }
        .filters { display:flex; gap:10px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; }
        .filter-btn { padding:7px 16px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); font-size:13px; font-weight:500; cursor:pointer; color:var(--text-2); white-space:nowrap; }
        .filter-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; }
        .notifs-list { display:grid; gap:10px; }
        .notif-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; display:flex; gap:14px; align-items:flex-start; }
        .notif-card.unread { border-left:4px solid var(--primary); background:#FAFCFF; }
        .notif-icon-wrap { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
        .type-PAYMENT_RECEIVED   { background:#F0FDF4; }
        .type-PAYMENT_FAILED     { background:#FEF2F2; }
        .type-RENT_REMINDER      { background:#FFFBEB; }
        .type-MAINTENANCE_UPDATE { background:#EFF6FF; }
        .type-ACCOUNT_CREATED    { background:var(--primary-light); }
        .type-GENERAL_NOTICE     { background:var(--bg); }
        .notif-body  { flex:1; min-width:0; }
        .notif-title { font-size:14px; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
        .unread-dot  { width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; }
        .notif-msg   { font-size:13px; color:var(--text-2); line-height:1.5; }
        .notif-time  { font-size:12px; color:var(--text-3); margin-top:6px; }
        .notif-card-actions { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
        .btn-mark-read { background:none; border:1px solid var(--primary); color:var(--primary); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; white-space:nowrap; }
        .btn-mark-read:hover { background:var(--primary-light); }
        .btn-del { background:none; border:1px solid #FECACA; color:var(--error); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; }
        .btn-del:hover { background:#FEF2F2; }
        .empty-state { text-align:center; padding:80px 20px; color:var(--text-2); }
        .empty-state .icon { font-size:56px; margin-bottom:16px; }
        .empty-state h3 { font-size:16px; font-weight:600; margin-bottom:8px; color:var(--text-1); }
        .summary-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 20px; margin-bottom:20px; display:flex; gap:24px; flex-wrap:wrap; font-size:13px; }
        .summary-bar span { color:var(--text-2); }
        .summary-bar strong { color:var(--text-1); }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand"><div class="icon">🏢</div><span>RentEase</span></div>
        <nav class="sidebar-nav">
            <a href="/pages/tenant/dashboard.html"       class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="/pages/tenant/pay-rent.html"        class="nav-item"><span class="nav-icon">💳</span> Pay Rent</a>
            <a href="/pages/tenant/payments.html"        class="nav-item"><span class="nav-icon">📋</span> Payment History</a>
            <a href="/pages/tenant/maintenance.html"     class="nav-item"><span class="nav-icon">🔧</span> Maintenance</a>
            <a href="/pages/tenant/profile.html"         class="nav-item"><span class="nav-icon">👤</span> My Profile</a>
            <a href="/pages/tenant/notifications.html"   class="nav-item active"><span class="nav-icon">🔔</span> Notifications</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-item" onclick="logout()"><span class="nav-icon">🚪</span> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <h1>Notifications</h1>
            <div class="user-pill">
                <div class="avatar" id="userAvatar">T</div>
                <span id="userName">Tenant</span>
            </div>
        </div>

        <div class="summary-bar">
            <span>Total: <strong id="totalCount">—</strong></span>
            <span>Unread: <strong id="unreadCount" style="color:var(--primary)">—</strong></span>
            <span>Read: <strong id="readCount">—</strong></span>
        </div>

        <div class="page-header">
            <div class="filters">
                <button class="filter-btn active" data-filter="ALL"               onclick="setFilter(this)">All</button>
                <button class="filter-btn"        data-filter="UNREAD"            onclick="setFilter(this)">🔵 Unread</button>
                <button class="filter-btn"        data-filter="READ"              onclick="setFilter(this)">✅ Read</button>
                <button class="filter-btn"        data-filter="PAYMENT_RECEIVED"  onclick="setFilter(this)">💰 Payments</button>
                <button class="filter-btn"        data-filter="MAINTENANCE_UPDATE" onclick="setFilter(this)">🔧 Maintenance</button>
                <button class="filter-btn"        data-filter="RENT_REMINDER"     onclick="setFilter(this)">⚠️ Reminders</button>
                <button class="filter-btn"        data-filter="GENERAL_NOTICE"    onclick="setFilter(this)">📢 Notices</button>
            </div>
            <div class="page-actions">
                <button class="btn-outline-sm" onclick="markAllRead()">✓ Mark all read</button>
                <button class="btn-danger-sm"  onclick="deleteAll()">🗑 Delete all</button>
            </div>
        </div>

        <div class="notifs-list" id="notifsList">
            <div class="empty-state"><div class="icon">🔔</div><h3>Loading...</h3></div>
        </div>
    </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/notifications.js"></script>
<script>
    requireAuth();
    const user = Auth.getUser();
    if (user) {
        document.getElementById('userName').textContent   = user.name;
        document.getElementById('userAvatar').textContent = user.name[0].toUpperCase();
    }

    let allNotifs = []; let currentFilter = 'ALL';

    const typeIcon = {
        PAYMENT_RECEIVED:'✅', PAYMENT_FAILED:'❌', RENT_REMINDER:'⚠️',
        MAINTENANCE_UPDATE:'🔧', ACCOUNT_CREATED:'🎉', GENERAL_NOTICE:'📢',
    };

    async function loadNotifs() {
        try {
            allNotifs = await NotificationAPI.list();
            updateSummary(); render();
        } catch (err) { console.error(err); }
    }

    function updateSummary() {
        const unread = allNotifs.filter(n => !n.read).length;
        document.getElementById('totalCount').textContent  = allNotifs.length;
        document.getElementById('unreadCount').textContent = unread;
        document.getElementById('readCount').textContent   = allNotifs.length - unread;
    }

    function render() {
        const list = document.getElementById('notifsList');
        let filtered = allNotifs;
        if (currentFilter === 'UNREAD')    filtered = allNotifs.filter(n => !n.read);
        else if (currentFilter === 'READ') filtered = allNotifs.filter(n => n.read);
        else if (currentFilter !== 'ALL')  filtered = allNotifs.filter(n => n.type === currentFilter);

        if (filtered.length === 0) {
            list.innerHTML = `<div class="empty-state">
        <div class="icon">🔔</div>
        <h3>No notifications</h3>
        <p>Nothing here for this filter.</p>
      </div>`;
            return;
        }

        list.innerHTML = filtered.map(n => `
      <div class="notif-card ${n.read ? '' : 'unread'}">
        <div class="notif-icon-wrap type-${n.type}">${typeIcon[n.type] || '🔔'}</div>
        <div class="notif-body">
          <div class="notif-title">
            ${!n.read ? '<span class="unread-dot"></span>' : ''}
            ${n.title}
          </div>
          <div class="notif-msg">${n.message}</div>
          <div class="notif-time">${formatTime(n.createdAt)}</div>
        </div>
        <div class="notif-card-actions">
          ${!n.read
            ? `<button class="btn-mark-read" data-id="${n.id}" onclick="markOne(this)">✓ Read</button>`
            : `<span style="font-size:11px;color:var(--text-3)">Read ✓</span>`}
          <button class="btn-del" data-id="${n.id}" onclick="deleteOne(this)">🗑 Delete</button>
        </div>
      </div>
    `).join('');
    }

    function setFilter(btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
    }

    async function markOne(btn) {
        const id = parseInt(btn.dataset.id);
        try {
            await NotificationAPI.markRead(id);
            const n = allNotifs.find(x => x.id === id);
            if (n) n.read = true;
            updateSummary(); render();
        } catch (err) { alert(err.message); }
    }

    async function markAllRead() {
        if (!confirm('Mark all notifications as read?')) return;
        try {
            await NotificationAPI.markAllRead();
            allNotifs.forEach(n => n.read = true);
            updateSummary(); render();
        } catch (err) { alert(err.message); }
    }

    async function deleteOne(btn) {
        const id = parseInt(btn.dataset.id);
        try {
            await NotificationAPI.delete(id);
            allNotifs = allNotifs.filter(n => n.id !== id);
            updateSummary(); render();
        } catch (err) { alert(err.message); }
    }

    async function deleteAll() {
        if (!confirm('Delete ALL notifications? This cannot be undone.')) return;
        try {
            await NotificationAPI.deleteAll();
            allNotifs = [];
            updateSummary(); render();
        } catch (err) { alert(err.message); }
    }

    function formatTime(dt) {
        if (!dt) return '';
        const now = new Date(); const date = new Date(dt);
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60)    return 'just now';
        if (diff < 3600)  return Math.floor(diff / 60) + ' min ago';
        if (diff < 86400) return Math.floor(diff / 3600) + ' hrs ago';
        return date.toLocaleDateString('en-KE', {
            day:'2-digit', month:'short', year:'numeric',
            hour:'2-digit', minute:'2-digit'
        });
    }

    loadNotifs();
</script>
</body>
</html>
