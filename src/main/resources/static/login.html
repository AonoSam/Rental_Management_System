<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign in — RentEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">

    <!-- Brand panel -->
    <div class="auth-brand">
        <div class="brand-icon">🏢</div>
        <h1>RentEase</h1>
        <p>Smart rental property management for landlords, tenants & caretakers</p>
        <div class="features">
            <div class="feature-item"><span class="dot"></span>M-Pesa rent collection</div>
            <div class="feature-item"><span class="dot"></span>Tenant & lease management</div>
            <div class="feature-item"><span class="dot"></span>Maintenance tracking</div>
            <div class="feature-item"><span class="dot"></span>Real-time financial reports</div>
        </div>
    </div>

    <!-- Form panel -->
    <div class="auth-form-panel">
        <div class="auth-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your account</p>

            <div id="alertBox" class="alert"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <div class="input-wrap">
                        <span class="icon">✉</span>
                        <input type="email" id="email" placeholder="you@example.com" required/>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required/>
                        <button type="button" class="toggle-pass" onclick="
              const i=document.getElementById('password');
              i.type=i.type==='password'?'text':'password';
              this.textContent=i.type==='password'?'👁':'🙈';
            ">👁</button>
                    </div>
                </div>

                <div class="forgot-row">
                    <a href="/forgot-password.html" class="link">Forgot password?</a>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary">
                    <span class="btn-text">Sign in</span>
                    <div class="btn-spinner"></div>
                </button>
            </form>

            <p class="switch-row">
                Don't have an account? <a href="/register.html" class="link">Create one</a>
            </p>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
</body>
</html>
